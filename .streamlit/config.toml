[theme]
primaryColor = "#2E7D32"
backgroundColor = "#F5F8F4"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1D2A22"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true

[browser]
serverAddress = "localhost"
gatherUsageStats = false

[client]
# Enxuga a barra superior do app: esconde o menu de desenvolvedor (⋮).
# Obs.: no Streamlit Community Cloud o ícone "ver código no GitHub" é injetado
# por fora do app; ele é ocultado adicionalmente via CSS/JS em app.py
# (_ocultar_acoes_github_toolbar). Isso é cosmético — o repo segue público.
toolbarMode = "minimal"
